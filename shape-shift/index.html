<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>shape-shift</title>
  </head>
  <body>
    <main id="app">
      <header id="topbar">
        <span id="hud-hp" class="hud-chip">HP: -</span>
        <span id="hud-wave" class="hud-chip">W: -/-</span>
        <span id="hud-pts" class="hud-chip">0pts</span>
        <span id="hud-seed" class="hud-chip" aria-label="run seed">seed: -</span>
        <button type="button" id="btn-mute" class="ctrl-btn ctrl-btn--mute" aria-label="Toggle sound">sfx on</button>
        <button type="button" id="btn-menu" class="ctrl-btn" aria-label="Main menu">☰</button>
      </header>
      <div id="game">
        <div id="overlay" hidden>
          <div id="overlay-inner"></div>
        </div>
      </div>
      <div id="hud-skills"></div>
      <footer id="footer-hint">drag anywhere to move · shots are automatic</footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
