name: Deploy games to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "simple-roguelike/**"
      - "shape-shift/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            simple-roguelike/package-lock.json
            shape-shift/package-lock.json

      - name: Install deps (simple-roguelike)
        working-directory: simple-roguelike
        run: npm ci

      - name: Run tests (simple-roguelike)
        working-directory: simple-roguelike
        run: npm test

      - name: Build (simple-roguelike)
        working-directory: simple-roguelike
        run: npm run build

      - name: Install deps (shape-shift)
        working-directory: shape-shift
        run: npm ci

      - name: Run tests (shape-shift)
        working-directory: shape-shift
        run: npm test

      - name: Build (shape-shift)
        working-directory: shape-shift
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/simple-roguelike _site/shape-shift
          cp -r simple-roguelike/dist/* _site/simple-roguelike/
          cp -r shape-shift/dist/* _site/shape-shift/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <meta charset="utf-8">
          <title>2D game playground</title>
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: ui-monospace, monospace; background: #0d0d14; color: #d6d6e0; padding: 24px; max-width: 560px; margin: 0 auto; }
            h1 { color: #f0b850; }
            ul { list-style: none; padding: 0; }
            li { margin: 12px 0; }
            a { color: #f0b850; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .desc { color: #8a8aa0; font-size: 14px; }
          </style>
          <h1>2D game playground</h1>
          <ul>
            <li>
              <a href="./simple-roguelike/">simple-roguelike</a>
              <div class="desc">Turn-based roguelike with FOV, combat, and mobile D-pad.</div>
            </li>
            <li>
              <a href="./shape-shift/">shape-shift</a>
              <div class="desc">Mobile-portrait reverse bullet-hell deckbuilder (WIP).</div>
            </li>
          </ul>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
